<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Developer Explorer</title>
    <meta name="description" content="A sleek, highly modular Vanilla JS web app to search and analyze GitHub developer profiles in real-time, featuring interactive repo sorting, filtering, and Chart.js language analytics.">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-brand">
            <svg class="github-icon" viewBox="0 0 16 16" width="24" height="24" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
            <span>GitHub Explorer</span>
        </div>
        <div class="nav-controls">
            <button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark Mode">
                <span class="theme-icon">☀️</span> Light Mode
            </button>
        </div>
    </nav>

    <main class="app-container">
        <!-- Hero Search Section -->
        <section class="hero-section">
            <div class="hero-content">
                <h1>Find Any GitHub Developer</h1>
                <p>Explore profiles, repositories, and analytics instantly.</p>
                
                <form id="search-form" class="search-box">
                    <div class="input-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="search-input" placeholder="Search GitHub username..." autocomplete="off">
                    </div>
                    <button type="submit" id="search-btn">Search</button>
                </form>
                
                <div id="error-container" class="error-container hidden" role="alert"></div>
                <div id="rate-limit-container" class="rate-limit-container hidden" aria-live="polite">
                    <span>API requests remaining this hour:</span>
                    <strong id="rate-limit-remaining">--</strong>
                </div>
            </div>
        </section>

        <!-- Loading Skeleton -->
        <section id="loading-container" class="loading-container hidden" aria-busy="true">
            <div class="skeleton-profile-card">
                <div class="skeleton skeleton-avatar-large"></div>
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text-short"></div>
            </div>
            
            <div class="skeleton-stats-grid">
                <div class="skeleton skeleton-stat-card"></div>
                <div class="skeleton skeleton-stat-card"></div>
                <div class="skeleton skeleton-stat-card"></div>
                <div class="skeleton skeleton-stat-card"></div>
            </div>

            <div class="skeleton-repos-grid">
                <div class="skeleton skeleton-repo-card"></div>
                <div class="skeleton skeleton-repo-card"></div>
                <div class="skeleton skeleton-repo-card"></div>
            </div>
        </section>

        <div id="dashboard-content" class="dashboard-content hidden">
            <!-- Profile Section -->
            <section id="profile-container" class="profile-container" aria-live="polite">
                <!-- Profile dynamically injected here -->
            </section>

            <!-- Statistics Cards Grid -->
            <section id="stats-container" class="stats-container">
                <!-- Stats dynamically injected here -->
            </section>

            <div class="dashboard-main-grid">
                <!-- Repositories Section -->
                <section id="repos-section" class="repos-section" aria-live="polite">
                    <div class="section-header">
                        <h2>Repositories</h2>
                        <div class="controls-panel">
                            <div class="sort-controls">
                                <label for="sort-select">Sort By:</label>
                                <select id="sort-select" class="modern-select">
                                    <option value="stars">Stars</option>
                                    <option value="forks">Forks</option>
                                    <option value="updated">Updated Date</option>
                                    <option value="name">Name</option>
                                </select>
                            </div>
                            <div class="filter-controls">
                                <label for="filter-select">Language:</label>
                                <select id="filter-select" class="modern-select">
                                    <option value="all">All Languages</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div id="repos-container" class="repo-grid"></div>
                </section>

                <!-- Analytics / Chart Section -->
                <aside class="analytics-section">
                    <section id="chart-container" class="chart-container glass-card" aria-live="polite">
                        <h2 class="chart-title">Language Breakdown</h2>
                        <div class="chart-area">
                            <canvas id="language-chart"></canvas>
                        </div>
                    </section>
                </aside>
            </div>
        </div>
    </main>

    <!-- App Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
