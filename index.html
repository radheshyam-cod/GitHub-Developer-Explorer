<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Developer Explorer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="app-container">
        <header>
            <h1>GitHub Developer Explorer</h1>
        </header>

        <section class="search-section">
            <form id="search-form">
                <input type="text" id="search-input" placeholder="Search GitHub username..." autocomplete="off">
                <button type="submit" id="search-btn">Search</button>
            </form>
            <div id="error-container" class="error-container hidden" role="alert"></div>
        </section>

        <section id="loading-container" class="loading-container hidden" aria-busy="true">
            <div class="spinner"></div>
            <div class="skeleton-profile">
                <div class="skeleton skeleton-avatar"></div>
                <div class="skeleton skeleton-text skeleton-title"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text"></div>
            </div>
        </section>

        <section id="profile-container" class="profile-container hidden" aria-live="polite">
            <!-- Profile dynamically injected here -->
        </section>
    </main>
    <script type="module" src="js/app.js"></script>
</body>
</html>
